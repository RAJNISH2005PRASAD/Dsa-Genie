# Kubernetes Secrets - DSA Genie
# IMPORTANT: Replace base64 values before applying!
# Generate base64: echo -n 'your-secret' | base64
#
# For production, use:
#   kubectl create secret generic dsa-genie-secrets --from-env-file=.env -n dsa-genie
# Or use Sealed Secrets / External Secrets Operator
---
apiVersion: v1
kind: Secret
metadata:
  name: dsa-genie-secrets
  namespace: dsa-genie
type: Opaque
stringData:
  # Use stringData for plain text (K8s encodes automatically)
  # Replace these with your actual values or use kubectl create secret
  MONGO_URI: "mongodb://localhost:27017/dsa-genie"
  JWT_SECRET: "change-me-in-production"
  CLIENT_URL: "http://localhost:3000"
  OPENAI_API_KEY: ""
  GEMINI_API_KEY: ""
  RAPIDAPI_KEY: ""
