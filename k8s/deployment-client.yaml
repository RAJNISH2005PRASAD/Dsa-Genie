apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: dsa-genie
  labels:
    app: dsa-genie
    component: client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dsa-genie
      component: client
  template:
    metadata:
      labels:
        app: dsa-genie
        component: client
    spec:
      containers:
        - name: client
          image: dsa-genie-client:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
