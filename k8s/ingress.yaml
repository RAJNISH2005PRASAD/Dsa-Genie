apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dsa-genie-ingress
  namespace: dsa-genie
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: dsa-genie.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: server
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client
                port:
                  number: 80
  # Uncomment for TLS
  # tls:
  #   - hosts:
  #       - dsa-genie.local
  #     secretName: dsa-genie-tls
