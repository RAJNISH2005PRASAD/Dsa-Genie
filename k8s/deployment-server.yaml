apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: dsa-genie
  labels:
    app: dsa-genie
    component: server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dsa-genie
      component: server
  template:
    metadata:
      labels:
        app: dsa-genie
        component: server
    spec:
      containers:
        - name: server
          image: dsa-genie-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: dsa-genie-config
            - secretRef:
                name: dsa-genie-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
