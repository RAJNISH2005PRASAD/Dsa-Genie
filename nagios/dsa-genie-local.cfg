# Nagios - DSA Genie LOCAL (Docker on localhost)
# Use this when running docker-compose on the same host as Nagios

define host {
    use                     linux-server
    host_name               dsa-genie-local
    alias                   DSA Genie (Local Docker)
    address                 127.0.0.1
}

define service {
    use                     generic-service
    host_name               dsa-genie-local
    service_description     API Health
    check_command           check_http!-H 127.0.0.1 -p 5000 -u /api/health -e 200
}

define service {
    use                     generic-service
    host_name               dsa-genie-local
    service_description     Frontend
    check_command           check_http!-H 127.0.0.1 -p 3000 -u / -e 200
}
