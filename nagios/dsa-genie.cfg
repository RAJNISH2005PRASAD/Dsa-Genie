# Nagios Configuration - DSA Genie Application Monitoring
# Place this file in your Nagios cfg_dir or include in nagios.cfg:
# cfg_file=/path/to/nagios/dsa-genie.cfg

###############################################################################
# Host Definition - DSA Genie Application Server
###############################################################################
define host {
    use                     linux-server
    host_name               dsa-genie-app
    alias                   DSA Genie Application
    address                 dsa-genie-server
    check_command           check-host-alive
    max_check_attempts      3
    notification_interval   30
    notification_period     24x7
    notification_options    d,u,r
}

###############################################################################
# Service: Backend API Health
###############################################################################
define service {
    use                     generic-service
    host_name               dsa-genie-app
    service_description     DSA Genie API Health
    check_command           check_http!-H dsa-genie-server -p 5000 -u /api/health -e 200
    check_interval          1
    retry_interval          1
    max_check_attempts      3
    normal_check_interval   5
}

###############################################################################
# Service: Frontend Web Server
###############################################################################
define service {
    use                     generic-service
    host_name               dsa-genie-app
    service_description     DSA Genie Frontend
    check_command           check_http!-H dsa-genie-client -p 80 -u / -e 200
    check_interval          1
    retry_interval          1
    max_check_attempts      3
    normal_check_interval   5
}

###############################################################################
# Service: Backend API Response Time
###############################################################################
define service {
    use                     generic-service
    host_name               dsa-genie-app
    service_description     API Response Time
    check_command           check_http!-H dsa-genie-server -p 5000 -u /api/health -w 2 -c 5
    check_interval          5
    normal_check_interval   10
}

###############################################################################
# Host Group
###############################################################################
define hostgroup {
    hostgroup_name          dsa-genie-servers
    alias                   DSA Genie Application Servers
    members                 dsa-genie-app
}

###############################################################################
# Service Group
###############################################################################
define servicegroup {
    servicegroup_name       dsa-genie-services
    alias                   DSA Genie Application Services
}
